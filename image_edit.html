<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>逕ｻ蜒冗ｷｨ髮・- MY繧｢繝ｫ繝舌Β</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .edit-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: white; }
        
        /* Image Preview Area */
        .preview-area {
            position: relative; width: 100%; height: calc(100vh - 380px); /* 繝・・繝ｫ繝舌・縺ｨ繝代ロ繝ｫ縺ｨ繝倥ャ繝繝ｼ蛻・ｼ輔￥ */
            background-color: #F2F2F7; display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }
        .preview-content {
            width: 90%; height: 90%; object-fit: contain;
            border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            background-image: url('images/twoshot.png'); background-size: cover; background-position: center;
            position: relative;
        }
        /* Stamp Example */
        .stamp-overlay {
            position: absolute; top: 10%; right: 10%; background: rgba(255, 97, 166, 0.9);
            color: white; padding: 4px 12px; border-radius: 20px; font-weight: 900;
            transform: rotate(15deg); font-size: 18px; box-shadow: 0 4px 12px rgba(255, 97, 166, 0.4);
            border: 2px solid white;
        }

        /* Tool Row */
        .toolbar {
            display: flex; padding: 16px; gap: 16px; overflow-x: auto;
            background: white; border-bottom: 1px solid var(--border-color);
            scrollbar-width: none;
        }
        .toolbar::-webkit-scrollbar { display: none; }
        .tool-btn {
            display: flex; flex-direction: column; align-items: center; gap: 6px;
            font-size: 11px; color: var(--text-main); font-weight: 600; min-width: 56px;
            background: none; border: none; cursor: pointer;
        }
        .tool-icon {
            width: 44px; height: 44px; border-radius: 50%; background: #F2F2F7;
            display: flex; align-items: center; justify-content: center; font-size: 20px;
            transition: 0.2s;
        }
        .tool-btn.active .tool-icon {
            background: var(--primary-color); color: white;
        }
        .sparkle-tool .tool-icon {
            background: linear-gradient(135deg, #FF9500, #FFCC00); color: white;
        }

        /* Context Area (Filters) */
        .context-area {
            background: #FAFAFA; padding: 16px; height: 110px;
            display: flex; gap: 12px; overflow-x: auto; scrollbar-width: none;
            align-items: center;
        }
        .context-area::-webkit-scrollbar { display: none; }
        .filter-item {
            display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer;
        }
        .filter-thumb {
            width: 60px; height: 60px; border-radius: 12px;
            background-image: url('images/twoshot.png'); background-size: cover;
            border: 3px solid transparent; transition: 0.2s;
        }
        .filter-item.active .filter-thumb { border-color: var(--primary-color); transform: scale(1.05); }
        .filter-label { font-size: 11px; font-weight: 700; color: var(--text-sub); }
        .filter-item.active .filter-label { color: var(--primary-color); }

        /* Filter specific effects on thumb */
        .f-clear { filter: contrast(1.1) saturate(1.2); }
        .f-warm { filter: sepia(0.3) contrast(1.1); }
        .f-cool { filter: contrast(1.1) saturate(0.8) hue-rotate(15deg); }
        .f-idol { filter: brightness(1.1) saturate(1.3) contrast(1.05); }

        /* Export Action Card */
        .export-card {
            background: white; padding: 16px 16px 24px; border-radius: 20px 20px 0 0;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.05); border-top: 1px solid var(--border-color);
            position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; z-index: 50;
        }
        .drawer-handle { width: 40px; height: 4px; background: #E5E5EA; border-radius: 2px; margin: 0 auto 16px; }
        
    </style>
</head>
<body style="background:var(--bg-color);">
    <div class="app-container" style="background:white; min-height:100vh;">
        
        <header class="edit-header">
            <a href="home.html" class="back-btn" style="font-size:20px; color:var(--text-main); text-decoration:none;">笨・/a>
            <div class="app-header-title">逕ｻ蜒冗ｷｨ髮・/div>
            <div class="text-xs text-sub" style="font-weight:800; color:var(--primary-color); cursor:pointer;" onclick="location.href='home.html'">菫晏ｭ・/div>
        </header>

        <!-- Preview -->
        <div class="preview-area">
            <div class="preview-content f-idol">
                <!-- 謗ｨ縺玲ｴｻ鬚ｨ繧ｹ繧ｿ繝ｳ繝・-->
                <div class="stamp-overlay">蟆翫＞笨ｨ</div>
                
                <!-- Guidelines (Rule of thirds mock) -->
                <div style="position:absolute; width:100%; height:33.3%; top:33.3%; border-top:1px dashed rgba(255,255,255,0.5); border-bottom:1px dashed rgba(255,255,255,0.5); pointer-events:none;"></div>
                <div style="position:absolute; height:100%; width:33.3%; left:33.3%; border-left:1px dashed rgba(255,255,255,0.5); border-right:1px dashed rgba(255,255,255,0.5); pointer-events:none;"></div>
            </div>
        </div>

        <!-- Tool Bar -->
        <div class="toolbar">
            <button class="tool-btn"><div class="tool-icon">笨ゑｸ・/div>繧ｯ繝ｭ繝・・</button>
            <button class="tool-btn active"><div class="tool-icon">笨ｨ</div>繝輔ぅ繝ｫ繧ｿ</button>
            <button class="tool-btn"><div class="tool-icon">・</div>繧ｹ繧ｿ繝ｳ繝・/button>
            <button class="tool-btn"><div class="tool-icon">笨抵ｸ・/div>繝壹Φ</button>
            <button class="tool-btn sparkle-tool"><div class="tool-icon">ｪ・/div>閾ｪ蜍戊｣懈ｭ｣</button>
            <button class="tool-btn"><div class="tool-icon">七</div>髻ｳ縺､縺・/button>
        </div>

        <!-- Context Area (Filters) -->
        <div class="context-area">
            <div class="filter-item">
                <div class="filter-thumb"></div>
                <div class="filter-label">Original</div>
            </div>
            <div class="filter-item">
                <div class="filter-thumb f-clear"></div>
                <div class="filter-label">Clear</div>
            </div>
            <div class="filter-item active">
                <div class="filter-thumb f-idol"></div>
                <div class="filter-label">Idol笨ｨ</div>
            </div>
            <div class="filter-item">
                <div class="filter-thumb f-warm"></div>
                <div class="filter-label">Warm</div>
            </div>
            <div class="filter-item">
                <div class="filter-thumb f-cool"></div>
                <div class="filter-label">Cool</div>
            </div>
        </div>

        <!-- Export Action Card -->
        <div class="export-card">
            <div class="drawer-handle"></div>
            <div class="social-row" style="padding:12px 0;">
                <div class="social-brand" style="font-weight:700;">繧｢繝ｫ繝舌Β縺ｫ菫晏ｭ・/div>
                <div style="font-size:12px; color:var(--text-sub); display:flex; align-items:center; gap:8px;">
                    縺ゅ♀縺・■繧・ｓ縺ｮ謗ｨ縺玲ｴｻHUB <span style="font-size:10px;">笆ｼ</span>
                </div>
            </div>
            <div class="social-row" style="padding:12px 0; border-bottom:none;">
                <div class="social-brand" style="font-weight:700;">鬮倡判雉ｪ繧ｨ繧ｯ繧ｹ繝昴・繝・<span class="badge" style="background:#FFF0E6; color:var(--primary-color);">D-DMC險ｼ譏・/span></div>
                <label class="toggle-switch transform scale-75">
                    <input type="checkbox" checked>
                    <span class="slider"></span>
                </label>
            </div>
            <button class="btn btn-primary" style="margin-top: 16px;" onclick="location.href='home.html'">沈 螳御ｺ・＠縺ｦ菫晏ｭ・/button>
        </div>

    </div>
<script src="nav.js"></script>
</body>
</html>
