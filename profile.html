<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>データ保管登録 - MYアルバム</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .page-title {
            text-align: center;
            font-size: 14px;
            color: var(--text-sub);
            margin: 16px 0 24px;
        }
        
        /* Profile Image Setup */
        .profile-img-setup {
            display: flex; align-items: center; gap: 16px; margin-bottom: 24px;
        }
        .profile-img-placeholder {
            width: 80px; height: 80px; border-radius: 50%;
            background-color: #E5E5EA; display: flex; align-items: center; justify-content: center;
            font-size: 32px; color: white;
        }

        /* D-DMC Storage UI */
        .storage-section {
            background-color: var(--card-bg); border-radius: var(--border-radius);
            padding: 16px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.03);
            border: 1px solid var(--border-color);
        }
        .storage-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;
        }
        .storage-title { font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .storage-limit { font-size: 12px; color: var(--text-sub); }
        .storage-metrics {
            display: flex; justify-content: space-between; font-size: 12px; margin-top: 8px;
        }
        
        /* Import Settings Grid */
        .settings-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px;
        }
        .social-card {
            background: white; border-radius: 12px; padding: 12px;
            border: 1px solid var(--border-color);
        }
        .social-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;
            font-weight: 600; font-size: 14px;
        }
        .sync-toggle {
            display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-sub);
        }

        .type-selector {
            display: flex; gap: 8px; margin-bottom: 32px; flex-wrap: wrap;
        }
        .type-btn {
            padding: 6px 16px; border-radius: 20px; border: 1px solid var(--border-color);
            background: white; font-size: 14px; cursor: pointer;
        }
        .type-btn.active { background: #FFF0E6; color: var(--primary-color); border-color: var(--primary-color); }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <a href="home.html" class="back-btn">‹</a>
            <div class="app-header-title">データ保管登録</div>
            <div style="width: 24px;"></div> <!-- spacer -->
        </header>

        <div class="p-4">
            <p class="page-title">クリエイター活動のデータを<br>Web3上で一元管理・資産化しましょう。</p>

            <!-- Profile Form Card -->
            <div class="card">
                <div class="profile-img-setup">
                    <img src="images/avatar.png" class="profile-img-placeholder" style="object-fit:cover; border:none; color:transparent;" alt="Profile Avatar">
                    <button class="btn btn-primary btn-sm" style="width: auto;">画像をアップロード</button>
                </div>

                <div class="input-group">
                    <label class="input-label">名前</label>
                    <input type="text" class="input-field" value="山田 太郎">
                </div>

                <div class="input-group">
                    <label class="input-label" style="display:flex; justify-content:space-between;">
                        <span>クリエイターネーム (表示名)</span>
                        <span style="color:red; font-size:12px;">未認証</span>
                    </label>
                    <input type="text" class="input-field" value="TaroCreative">
                </div>

                <div class="input-group">
                    <label class="input-label">公式ディレクター申請</label>
                    <div class="toggle-row" style="padding:0; border:none;">
                        <span class="text-sub text-xs">審査に合格すると「✓」バッジが付与されます</span>
                        <label class="toggle-switch">
                            <input type="checkbox">
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>

                <div class="input-group">
                    <label class="input-label">自己紹介</label>
                    <textarea class="input-field" placeholder="クリエイターとしての活動内容やビジョンなどを入力してください。"></textarea>
                </div>
            </div>

            <!-- Web3 Storage UI -->
            <div class="storage-section">
                <div class="storage-header">
                    <div class="storage-title">
                        <span class="ecosystem-badge bg-ddmc">D-DMC</span> ストレージ状況
                    </div>
                    <a href="payment.html" class="storage-limit" style="color:var(--primary-color); text-decoration:none;">🚀 プレミアムへアップグレード</a>
                </div>
                
                <div class="storage-bar-container">
                    <div class="storage-bar storage-hot" style="width: 40%;"></div>
                    <div class="storage-bar storage-cold" style="width: 35%;"></div>
                </div>
                
                <div class="storage-metrics">
                    <div style="display:flex; align-items:center; gap:4px;"><div class="dot dot-hot"></div> HOT DATA: 40GB</div>
                    <div style="display:flex; align-items:center; gap:4px;"><div class="dot dot-cold"></div> COLD DATA: 35GB</div>
                    <div>空き: 25GB</div>
                </div>
                <p class="text-xs text-sub mt-4">※HOTデータは高速アクセス枠、COLDデータは長期保存アーカイブ枠です。</p>
            </div>

            <!-- Import Settings -->
            <h2 style="font-size: 16px; display:flex; align-items:center; gap:8px;" class="mb-4">
                <span style="width:4px; height:16px; background:var(--primary-color); display:inline-block; border-radius:2px;"></span>
                コンテンツインポート設定
            </h2>

            <div class="settings-grid">
                <!-- YouTube -->
                <div class="social-card">
                    <div class="social-header">
                        <span>▶ YouTube</span>
                        <label class="toggle-switch transform scale-75" style="transform: scale(0.8); transform-origin: right;">
                            <input type="checkbox" checked>
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="sync-toggle">
                        <label class="toggle-switch" style="transform: scale(0.7); transform-origin: left;">
                            <input type="checkbox" checked>
                            <span class="slider"></span>
                        </label>
                        <span>自動 / 手動</span>
                    </div>
                </div>

                <!-- Instagram -->
                <div class="social-card">
                    <div class="social-header">
                        <span>📷 Instagram</span>
                        <label class="toggle-switch transform scale-75" style="transform: scale(0.8); transform-origin: right;">
                            <input type="checkbox" checked>
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="sync-toggle">
                        <label class="toggle-switch" style="transform: scale(0.7); transform-origin: left;">
                            <input type="checkbox" checked>
                            <span class="slider"></span>
                        </label>
                        <span>自動 / 手動</span>
                    </div>
                </div>

                <!-- TikTok -->
                <div class="social-card">
                    <div class="social-header">
                        <span>🎵 TikTok</span>
                        <label class="toggle-switch transform scale-75" style="transform: scale(0.8); transform-origin: right;">
                            <input type="checkbox">
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>

                <!-- X -->
                <div class="social-card">
                    <div class="social-header">
                        <span>𝕏 X</span>
                        <label class="toggle-switch transform scale-75" style="transform: scale(0.8); transform-origin: right;">
                            <input type="checkbox">
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>
                
                <!-- SHOWROOM (Web3 Requirement) -->
                <div class="social-card" style="grid-column: span 2;">
                    <div class="social-header">
                        <span>🌟 SHOWROOM 連携</span>
                        <label class="toggle-switch transform scale-75" style="transform: scale(0.8); transform-origin: right;">
                            <input type="checkbox">
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>
            </div>

            <h3 class="input-label">インポートするコンテンツの種類</h3>
            <div class="type-selector">
                <button class="type-btn active">動画</button>
                <button class="type-btn active">画像</button>
                <button class="type-btn">ライブ</button>
                <button class="type-btn">AI楽曲</button>
            </div>

            <button class="btn btn-primary" onclick="location.href='home.html'">設定を保存して次へ</button>
        </div>
        
        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
             <a href="home.html" class="nav-item">
                 <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                 ホーム
             </a>
             <a href="search.html" class="nav-item">
                 <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                 検索
             </a>
             <a href="album_edit.html" class="nav-fab">+</a>
             <a href="payment.html" class="nav-item">
                 <svg viewBox="0 0 24 24"><path d="M21 18v1H3v-1h18zM3 13h18v-2H3v2zm0-5h18V6H3v2z"/></svg>
                 収益
             </a>
             <a href="profile.html" class="nav-item active">
                 <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                 👤
             </a>
         </nav>
    </div>
    <script src="app.js"></script>
</body>
</html>
