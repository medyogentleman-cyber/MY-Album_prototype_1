<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>検索 - MYアルバム</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .search-header {
            padding: 16px; background: white; border-bottom: 1px solid var(--border-color);
            position: sticky; top: 0; z-index: 100;
        }
        .search-bar {
            background: var(--bg-color); border-radius: var(--border-radius);
            display: flex; align-items: center; padding: 0 16px; height: 44px;
        }
        .search-input {
            width: 100%; background: transparent; border: none; outline: none;
            font-size: 15px; margin-left: 8px; font-family: inherit;
        }
        
        /* Two Tabs */
        .search-tabs { display: flex; margin-top: 16px; }
        .s-tab { flex: 1; text-align: center; padding: 12px 0; font-size: 14px; font-weight: 600; color: var(--text-sub); border-bottom: 2px solid transparent; cursor: pointer; }
        .s-tab.active { color: var(--primary-color); border-bottom-color: var(--primary-color); }

        /* Search Results Lists */
        .list-container { padding: 16px; }
        
        .creator-card {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px; background: white; border-radius: 12px; border: 1px solid var(--border-color);
            margin-bottom: 12px;
        }
        .c-info { display: flex; align-items: center; gap: 12px; }
        .c-avatar { width: 48px; height: 48px; border-radius: 50%; background: #E5E5EA; object-fit: cover; }
        .c-name { font-weight: 700; font-size: 14px; display: flex; align-items: center; gap:4px; }
        .c-stats { font-size: 11px; color: var(--text-sub); margin-top: 4px; }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Search Header -->
        <header class="search-header">
            <div class="search-bar">
                <span style="color:var(--text-sub);">🔍</span>
                <input type="text" class="search-input" placeholder="アルバム、クリエイターを検索...">
            </div>
            
            <div class="search-tabs tab-container mt-4">
                <div class="s-tab active">アルバム</div>
                <div class="s-tab">クリエイター</div>
            </div>
        </header>

        <div class="tab-content">
            <!-- Albums Tab -->
            <div class="tab-pane active block">
                <div class="list-container">
                    <p class="text-sub text-xs mb-4">人気の神アーカイブ</p>
                    
                    <!-- Album Result Card (Resusing style from home list view logic) -->
                    <div class="card" style="display:flex; gap:12px; padding:12px; cursor:pointer;" onclick="location.href='album_view.html'">
                        <img src="images/live.png" style="width:100px; height:70px; border-radius:8px; flex-shrink:0; object-fit:cover;">
                        <div style="flex:1;">
                            <div style="font-size:14px; font-weight:600; margin-bottom:4px;">2024 ツアー神シーンまとめ</div>
                            <div style="font-size:10px; color:var(--text-sub); margin-bottom:8px;">保存: 4,500 / 協力者: 12人</div>
                            <span class="badge" style="background:var(--primary-color); color:white; border-radius:4px; font-weight:bold; font-size:9px;">Curator Lv.5</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Creators Tab -->
            <div class="tab-pane hidden">
                <div class="list-container">
                    
                    <div class="creator-card">
                        <div class="c-info">
                            <img src="images/avatar.png" class="c-avatar" alt="creator">
                            <div>
                                <div class="c-name">動画職人太郎 <span style="color:var(--primary-color); font-size:11px;">✓</span></div>
                                <div class="c-stats">フォロワー 1.2M • 投稿件数 340</div>
                            </div>
                        </div>
                        <button class="btn btn-outline btn-sm" style="width:auto; border-radius:20px;">フォロー</button>
                    </div>

                    <div class="creator-card">
                        <div class="c-info">
                            <img src="images/avatar.png" class="c-avatar" alt="creator">
                            <div>
                                <div class="c-name">ハル@推し活</div>
                                <div class="c-stats">フォロワー 12K • 投稿件数 84</div>
                            </div>
                        </div>
                        <button class="btn btn-primary btn-sm" style="width:auto; border-radius:20px;">フォロー中</button>
                    </div>
                    
                </div>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
             <a href="home.html" class="nav-item">
                 <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                 ホーム
             </a>
             <a href="search.html" class="nav-item active">
                 <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                 検索
             </a>
             <a href="album_edit.html" class="nav-fab">+</a>
             <a href="payment.html" class="nav-item">
                 <svg viewBox="0 0 24 24"><path d="M21 18v1H3v-1h18zM3 13h18v-2H3v2zm0-5h18V6H3v2z"/></svg>
                 収益
             </a>
             <a href="profile.html" class="nav-item">
                 <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                 👤
             </a>
         </nav>
    </div>
    <script src="app.js"></script>
</body>
</html>
