<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>縺ゅ♀縺・■繧・ｓ縺ｮ縺ｿ繧峨＞ - MY繧｢繝ｫ繝舌Β</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .profile-header {
            display: flex; flex-direction: column; align-items: center;
            padding: 24px 16px; background-color: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
        }
        .avatar {
            width: 80px; height: 80px; border-radius: 50%;
            background-color: #E5E5EA; object-fit: cover;
            margin-bottom: 12px; border: 2px solid white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .user-name { font-size: 18px; font-weight: 800; text-align: center; margin-bottom: 4px; }
        .stats-row { display: flex; justify-content: center; gap: 32px; margin-top: 16px; width: 100%; }
        .stat-item { display: flex; flex-direction: column; align-items: center; }
        .stat-val { font-size: 16px; font-weight: 700; }
        .stat-label { font-size: 12px; color: var(--text-sub); }
        .hub-tabs { display: flex; padding: 16px 16px 0; gap: 8px; background-color: var(--bg-color); position: sticky; top: 0; z-index: 90; }
        .tab-btn { flex: 1; padding: 10px 0; border-radius: 20px; background-color: white; border: 1px solid var(--border-color); color: var(--text-sub); font-size: 14px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .tab-btn.active { background-color: var(--primary-color); color: white; border-color: var(--primary-color); }
        .filters { display: flex; gap: 8px; padding: 12px 16px; overflow-x: auto; white-space: nowrap; -ms-overflow-style: none; scrollbar-width: none; }
        .filters::-webkit-scrollbar { display: none; }
        .filter-btn { padding: 6px 16px; border-radius: 20px; background-color: white; border: 1px solid var(--border-color); font-size: 12px; color: var(--text-main); fill: var(--text-sub); display: flex; align-items: center; gap: 4px; cursor: pointer; }
        .filter-btn.active { background-color: var(--primary-light); color: var(--primary-color); border-color: var(--primary-light); fill: var(--primary-color); }
        .album-grid { padding: 0 16px 16px; display: grid; grid-template-columns: 1fr; gap: 16px; }
        .album-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.06); display: flex; flex-direction: column; position: relative; }
        .curator-badge { position: absolute; top: 0; right: 0; background: var(--primary-color); color: white; padding: 4px 12px; font-size: 10px; font-weight: bold; border-bottom-left-radius: 8px; }
        .album-cover { width: 100%; height: 160px; background-color: #E5E5EA; object-fit: cover; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap:2px; }
        .album-cover img { width: 100%; height: 100%; object-fit: cover; }
        .album-info { padding: 12px; flex: 1; }
        .album-title { font-weight: 600; font-size: 15px; margin-bottom: 4px; }
        .album-meta { display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: var(--text-sub); margin-top: 8px; }
    </style>
</head>
<body>
    <div class="app-container">
        
        <!-- Profile Header -->
        <header class="profile-header">
            <div style="width:100%; display:flex; justify-content: space-between; align-items:flex-start;">
                 <a href="my_albums.html" style="text-decoration:none; color:var(--text-main); font-size: 24px; font-weight:bold; width: 24px;">竊・/a>
                 <div style="position:relative;">
                    <img src="images/aoi_future_album.png" class="avatar" alt="Curator Avatar">
                    <div style="position:absolute; bottom:12px; right:0; background:var(--primary-color); color:white; border-radius:50%; width:20px; height:20px; display:flex; align-items:center; justify-content:center; font-size:10px; border:2px solid white;">笨・/div>
                </div>
                <button class="btn btn-sm" style="background-color: var(--primary-color); color: white; border: none; border-radius: 20px; padding: 6px 16px; font-weight: bold; font-size: 12px; width: auto; height:fit-content;">繝輔か繝ｭ繝ｼ荳ｭ</button>
            </div>
            
            <h1 class="user-name">縺ゅ♀縺・■繧・ｓ縺ｮ縺ｿ繧峨＞</h1>
            <div style="font-size: 13px; font-weight: 600; color: var(--primary-color); margin-bottom: 4px; display:flex; align-items:center; gap:4px;">
                <span style="font-size:16px;">側</span> 繧ｴ繧､繧ｴ繧､繧ｹ繝ｼ
            </div>
            <div style="font-size: 11px; color: var(--text-sub);">譖ｴ譁ｰ譌･: 2026/1/17</div>
            
            <div class="stats-row">
                <div class="stat-item">
                    <span class="stat-val">1,056</span>
                    <span class="stat-label">笶､・・髻ｳ驥・/span>
                </div>
                <div class="stat-item">
                    <span class="stat-val">346</span>
                    <span class="stat-label">則 繝輔ぃ繝ｳ謨ｰ</span>
                </div>
            </div>
        </header>

        <!-- Tabs -->
        <div class="hub-tabs tab-container">
            <button class="tab-btn active">蜈ｬ髢九さ繝ｳ繝・Φ繝・/button>
        </div>

        <!-- Filters -->
        <div class="filters">
            <button class="filter-btn active">葡 譁ｰ逹</button>
            <button class="filter-btn">箝・莠ｺ豌・/button>
        </div>

        <div class="tab-content">
            <div class="tab-pane active block p-4">
                <div class="album-grid">
                    <div class="album-card" onclick="location.href='album_view.html'" style="cursor:pointer;">
                        <div class="album-cover" style="display:block; position:relative;">
                            <img src="images/live.png" style="width:100%; height:100%; object-fit:cover;">
                            <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:var(--primary-color); color:white; border-radius:50%; width:32px; height:32px; display:flex; align-items:center; justify-content:center;">笆ｶ</div>
                        </div>
                        <div class="album-info">
                            <div class="album-title">譛ｪ譚･縺ｸ縺ｮ豎ｺ諢剰｡ｨ譏弱Λ繧､繝・/div>
                            <div class="tag-cloud">
                                <span class="badge badge-outline">#繝ｩ繧､繝悶∪縺ｨ繧・/span>
                            </div>
                            <div class="album-meta mt-4">
                                <span>薄 菫晏ｭ俶焚: 320</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        

    </div>
    <script src="app.js"></script>
<script src="nav.js"></script>
</body>
</html>
