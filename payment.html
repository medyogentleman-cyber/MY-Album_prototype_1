<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>収益・決済 - MYアルバム</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .revenue-hero {
            background: linear-gradient(135deg, var(--primary-color) 0%, #FF9955 100%);
            color: white; padding: 24px 16px; border-radius: 0 0 24px 24px;
            margin-bottom: 24px; box-shadow: 0 4px 12px rgba(255,107,0,0.2);
        }
        .earn-label { font-size: 14px; font-weight: 600; opacity: 0.9; }
        .earn-amount { font-size: 32px; font-weight: 800; display: flex; align-items: baseline; gap: 4px; margin: 8px 0; }
        .earn-currency { font-size: 16px; font-weight: 600; }
        
        .calc-box {
            background: white; border: 2px solid var(--border-color);
            border-radius: var(--border-radius); padding: 20px;
            margin-bottom: 24px; text-align: center;
        }
        .currency-input {
            width: 100%; border: none; border-bottom: 2px solid var(--border-color);
            font-size: 24px; font-weight: 700; text-align: center; padding: 8px;
            outline: none; color: var(--text-main); font-family: inherit; margin-bottom: 16px;
        }
        .currency-input:focus { border-color: var(--primary-color); }
        .dmcc-result {
            font-size: 36px; font-weight: 800; color: var(--primary-color);
            display: flex; align-items: baseline; justify-content: center; gap: 8px; margin: 16px 0;
        }
        
        .external-link {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            font-size: 14px; color: #0075FF; text-decoration: none; font-weight: 600;
            background: #E5F0FF; padding: 12px; border-radius: 8px; margin-top: 16px;
        }

        .action-list {
            display: flex; flex-direction: column; gap: 12px; margin-bottom: 32px;
        }
        .action-item {
            background: white; border: 1px solid var(--border-color); padding: 16px;
            border-radius: 12px; display: flex; align-items: center; justify-content: space-between;
        }
        .action-icon {
            width: 40px; height: 40px; background: var(--bg-color); border-radius: 8px;
            display: flex; align-items: center; justify-content: center; font-size: 20px;
        }
        .action-text { flex: 1; margin: 0 16px; }
        .action-title { font-weight: 700; font-size: 15px; margin-bottom: 4px; }
        .action-desc { font-size: 12px; color: var(--text-sub); }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header" style="background:var(--primary-color); color:white; border:none;">
            <div style="width: 24px;"></div> <!-- Spacer -->
            <div class="app-header-title">収益管理・決済</div>
            <div style="width: 24px;"></div>
        </header>

        <!-- Revenue Dashboard -->
        <div class="revenue-hero">
            <div class="earn-label">Curation to Earn 獲得残高</div>
            <div class="earn-amount">
                12,450.00 <span class="earn-currency">DMCC</span>
            </div>
            <div style="font-size: 12px; display:flex; justify-content:space-between; align-items:center;">
                <span>≈ ¥186,750 JPY</span>
                <button class="btn btn-sm" style="background:white; color:var(--primary-color); width:auto; padding: 6px 12px;">引き出す</button>
            </div>
        </div>

        <div class="p-4" style="padding-top: 0;">
            <h2 class="mb-4 text-center">DMCC - 日本円 計算機</h2>
            
            <div class="calc-box">
                <div class="text-sub text-xs mb-2">① 金額を日本円(JPY)で入力</div>
                <div style="display:flex; align-items:center; gap:8px;">
                     <span style="font-size:24px; font-weight:700;">¥</span>
                     <input type="number" id="jpy-amount" class="currency-input" placeholder="1000" style="margin:0;">
                </div>
                
                <div style="margin: 16px 0; color:var(--text-sub);">🔻 自動換算 🔻</div>
                
                <div class="text-sub text-xs">② 必要なDMCC</div>
                <div class="dmcc-result">
                    <span id="dmcc-output">0.00</span> <span style="font-size:16px;">DMCC</span>
                </div>

                <a href="https://phemex.com/ja/how-to-buy/decentralized-music-chain" target="_blank" class="external-link">
                    🌐 DMCCの購入方法はこちら (Phemex) →
                </a>
            </div>

            <h3 class="mb-4">プラットフォーム内決済</h3>
            <div class="action-list">
                <!-- Tipping -->
                <div class="action-item">
                    <div class="action-icon">🎁</div>
                    <div class="action-text">
                        <div class="action-title">クリエイターへ投げ銭</div>
                        <div class="action-desc">推しのクリエイターをDMCCで直接支援</div>
                    </div>
                    <button class="btn btn-primary btn-sm" style="width:auto; border-radius:8px;">送金</button>
                </div>
                
                <!-- Premium Storage -->
                <div class="action-item">
                    <div class="action-icon" style="background:var(--ddmc-blue); color:white;">💾</div>
                    <div class="action-text">
                        <div class="action-title">プレミアムストレージ課金</div>
                        <div class="action-desc">D-DMCの保存容量(HOT)を拡張する</div>
                    </div>
                    <button class="btn btn-outline btn-sm" style="width:auto; border-radius:8px;">プラン詳細</button>
                </div>
                
                <!-- Buy Content -->
                <div class="action-item">
                    <div class="action-icon">🔒</div>
                    <div class="action-text">
                        <div class="action-title">限定コンテンツ購入</div>
                        <div class="action-desc">NFT化された神アーカイブを購入</div>
                    </div>
                    <button class="btn btn-outline btn-sm" style="width:auto; border-radius:8px;">検索へ</button>
                </div>
            </div>
            
            <div style="height: 60px;"></div>
        </div>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
             <a href="home.html" class="nav-item">
                 <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                 ホーム
             </a>
             <a href="search.html" class="nav-item">
                 <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                 検索
             </a>
             <a href="album_edit.html" class="nav-fab">+</a>
             <a href="payment.html" class="nav-item active">
                 <svg viewBox="0 0 24 24"><path d="M21 18v1H3v-1h18zM3 13h18v-2H3v2zm0-5h18V6H3v2z"/></svg>
                 収益
             </a>
             <a href="profile.html" class="nav-item">
                 <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                 👤
             </a>
         </nav>
    </div>
    
    <!-- External scripts -->
    <script src="app.js"></script>
    <script>
      // Trigger calculation initially if value exists
      setTimeout(() => {
          const input = document.getElementById('jpy-amount');
          if(input) {
              const event = new Event('input', { bubbles: true });
              input.dispatchEvent(event);
          }
      }, 100);
    </script>
</body>
</html>
